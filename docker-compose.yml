services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: flaskdb
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: flaskpass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - assignment3-net

  flask:
    build: ./app/flask-api
    container_name: flask-compose
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: flaskuser
      DB_PASSWORD: flaskpass
      DB_NAME: flaskdb
    networks:
      - assignment3-net

  nginx:
    build: ./app/nginx
    container_name: nginx-compose
    ports:
      - "80:80"
    depends_on:
      - flask
    networks:
      - assignment3-net

networks:
  assignment3-net:
    driver: bridge

volumes:
  mysql-data:
